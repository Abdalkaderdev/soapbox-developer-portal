apiVersion: apps/v1
kind: Deployment
metadata:
  name: developer-portal
  namespace: soapbox
  labels:
    app: developer-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: developer-portal
  template:
    metadata:
      labels:
        app: developer-portal
    spec:
      containers:
        - name: developer-portal
          image: ghcr.io/abdalkaderdev/soapbox-developer-portal:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXTAUTH_URL
              value: "https://developers.soapboxsuperapp.com"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: developer-portal-secrets
                  key: nextauth-secret
            - name: SOAPBOX_API_URL
              value: "https://api.soapboxsuperapp.com/api/v1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/auth/session
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/auth/session
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      imagePullSecrets:
        - name: ghcr-auth
---
apiVersion: v1
kind: Service
metadata:
  name: developer-portal
  namespace: soapbox
spec:
  selector:
    app: developer-portal
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: developer-portal
  namespace: soapbox
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - developers.soapboxsuperapp.com
      secretName: developer-portal-tls
  rules:
    - host: developers.soapboxsuperapp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: developer-portal
                port:
                  number: 80
